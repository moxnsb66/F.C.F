<script src="../script.js"></script>

<script>

/* 🔥 AJOUT PANIER PARFUM */
function ajouterParfum(nomProduit, selectId) {

  let select = document.getElementById(selectId);
  let [image, prix, ml] = select.value.split("|");

  let nom = nomProduit + " - " + ml;

  addToCart(nom, parseInt(prix), "../images/" + image);
}

/* 🔥 WHATSAPP */
function commanderParfum(nomProduit, selectId) {

  let select = document.getElementById(selectId);
  let [image, prix, ml] = select.value.split("|");

  let message = `Bonjour, je veux commander ${nomProduit} (${ml}, ${prix}$)`;

  window.open("https://wa.me/14184902134?text=" + encodeURIComponent(message));
}

</script>
