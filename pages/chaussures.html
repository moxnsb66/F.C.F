<h1 class="titre">Nos Chaussures</h1>

<section class="produits">

<!-- AIR FORCE 1 -->
<div class="produit">

  <div class="galerie grid">
    <img src="../images/nike-blanc.jpg">
    <img src="../images/nike-noir.jpg">
    <img src="../images/nike-bleu.jpg">
    <img src="../images/nike-rouge.jpg">
  </div>

  <h2>Nike Air Force 1</h2>

  <p class="prix" id="prix-af1">120$</p>

  <!-- 🎨 COULEUR -->
  <select id="var-af1">
    <option value="120">blanc</option>
    <option value="150">noir</option>
    <option value="140">bleu</option>
    <option value="160">rouge</option>
  </select>

  <div class="actions">

    <button class="btn panier"
      onclick="ajouterPanier('Nike Air Force 1','af1','../images/nike-blanc.jpg')">
      🛒 Ajouter
    </button>

    <a href="airforce1.html" class="btn">Voir</a>

  </div>

</div>

<!-- DUNK LOW -->
<div class="produit">

  <div class="galerie grid">
    <img src="../images/nike-low-dunk-blanc.jpg">
    <img src="../images/nike-low-dunk-bleu.jpg">
    <img src="../images/nike-low-dunk-Gold.jpg">
    <img src="../images/nike-low-dunk-noir.jpg">
  </div>

  <h2>Nike Dunk Low</h2>

  <p class="prix" id="prix-dunk">10$</p>

  <!-- 🎨 COULEUR -->
  <select id="var-dunk">
    <option value="120">blanc</option>
    <option value="140">bleu</option>
    <option value="160">Gold</option>
    <option value="150">noir</option>
  </select>

  <div class="actions">

    <button class="btn panier"
      onclick="ajouterPanier('Nike Dunk Low','dunk','../images/nike-low-dunk-blanc.jpg')">
      🛒 Ajouter
    </button>

    <a href="nike-dunk.html" class="btn">Voir</a>

  </div>

</div>

</section>

<!-- SCRIPT GLOBAL -->
<script src="../script.js"></script>
